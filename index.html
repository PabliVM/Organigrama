<!-- =====================================================
BLOQUE MAESTRO CORPORATIVO RM
Header + Footer + Variables + Dark Mode
Copiar en cualquier proyecto HTML
===================================================== -->

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nombre del documento</title>

<style>
/* =====================================================
1. VARIABLES CORPORATIVAS
===================================================== */
:root{
  --bg:#f0f2f5;
  --surface:#ffffff;
  --surface-alt:#fafbfc;

  --border:#dfe1e6;
  --border-light:#eaecf0;

  --text:#1a1d23;
  --text-sec:#5a6170;
  --text-mut:#8b919e;
  --text-faint:#b4b9c4;

  --rm-blue:#2563eb;
  --rm-blue-lt:#3b7cf5;
  --rm-blue-bg:#edf1fc;

  --green:#16a34a;
  --orange:#ea580c;
  --red:#dc2626;

  --sh-sm:0 1px 3px rgba(0,0,0,.06);
  --sh-md:0 2px 8px rgba(0,0,0,.08);
  --sh-lg:0 4px 16px rgba(0,0,0,.12);

  --r:8px;
  --rs:5px;
  --rl:12px;

  --font:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
  --tr:.2s ease;
}

/* =====================================================
2. DARK MODE
===================================================== */
body.dark{
  --bg:#1a1d23;
  --surface:#23272f;
  --surface-alt:#2a2e36;

  --border:#3a3f4a;
  --border-light:#32363e;

  --text:#e4e6ea;
  --text-sec:#a0a5b0;
  --text-mut:#707580;
  --text-faint:#505560;

  --rm-blue-bg:#1e2a4a;

  --sh-sm:0 1px 3px rgba(0,0,0,.2);
  --sh-md:0 2px 8px rgba(0,0,0,.3);
  --sh-lg:0 4px 16px rgba(0,0,0,.4);
}

/* =====================================================
3. RESET
===================================================== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  line-height:1.45;
  font-size:13px;
  -webkit-font-smoothing:antialiased;
  padding-bottom:54px;
}

/* =====================================================
4. HEADER CORPORATIVO
===================================================== */
.header{
  background:var(--rm-blue);
  padding:12px 24px;
  display:flex;
  align-items:center;
  gap:14px;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.header-logo{
  width:38px;
  height:38px;
  border-radius:50%;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  overflow:hidden;
  padding:3px;
}

.header-logo img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.header-title-wrap{
  display:flex;
  align-items:baseline;
  gap:10px;
  min-width:0;
  flex:1;
}

.doc-title{
  font-size:17px;
  font-weight:700;
  color:#fff;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  letter-spacing:-.3px;
}

.doc-season{
  font-size:13px;
  font-weight:500;
  color:rgba(255,255,255,.72);
  white-space:nowrap;
}

.btn-dark{
  width:28px;
  height:28px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.12);
  color:#fff;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  flex-shrink:0;
  transition:all var(--tr);
}

.btn-dark:hover{
  background:rgba(255,255,255,.25);
}

/* =====================================================
5. MAIN CONTENT
===================================================== */
.main{
  max-width:1600px;
  margin:0 auto;
  padding:16px 24px;
}

/* =====================================================
6. FOOTER CORPORATIVO
===================================================== */
.app-footer{
  background:var(--rm-blue);
  color:rgba(255,255,255,.5);
  font-size:10px;
  letter-spacing:.3px;
  text-align:center;
  padding:12px 24px;
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:50;
}

/* =====================================================
7. RESPONSIVE
===================================================== */
@media(max-width:640px){

  .header{
    padding:8px 12px;
    gap:10px;
  }

  .header-logo{
    width:34px;
    height:34px;
  }

  .doc-title{
    font-size:14px;
  }

  .doc-season{
    font-size:11px;
  }

  .main{
    padding:10px 12px;
  }

  .app-footer{
    padding:10px 12px;
    font-size:9px;
  }
}
</style>
</head>

<body>

<!-- =====================================================
HEADER
===================================================== -->
<header class="header">

  <div class="header-logo">
    <img src="TU_ESCUDO.png" alt="Escudo">
  </div>

  <div class="header-title-wrap">
    <h1 class="doc-title">Nombre del documento</h1>
    <span class="doc-season">2026/2027</span>
  </div>

  <button class="btn-dark" onclick="toggleDark()" id="darkBtn">
    ☾
  </button>

</header>

<!-- =====================================================
CONTENIDO
===================================================== -->
<main class="main">

  <!-- AQUÍ TU APP -->

</main>

<!-- =====================================================
FOOTER
===================================================== -->
<footer class="app-footer">
  Cantera del Real Madrid CF - Nombre del documento
</footer>

<script>
function toggleDark(){
  document.body.classList.toggle('dark');

  const btn = document.getElementById('darkBtn');

  if(document.body.classList.contains('dark')){
    btn.innerHTML = '☀';
  }else{
    btn.innerHTML = '☾';
  }
}
</script>

</body>
</html>
