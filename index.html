<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor de Organigramas</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ─── RESET & BASE ─── */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0f0f13;
  --surface:#1a1a22;
  --surface2:#22222e;
  --border:#2e2e3e;
  --text:#f0f0f5;
  --text2:#9090a8;
  --accent:#4f7cff;
  --accent2:#6f9cff;
  --green:#3ecf8e;
  --red:#ff5c5c;
  --yellow:#ffd166;
  --shadow:rgba(0,0,0,0.5);
  --node-h:44px;
  --node-w:72px;
  --gap-x:12px;
  --gap-y:48px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ─── TOP BAR ─── */
#topbar{
  display:flex;align-items:center;gap:12px;
  padding:10px 16px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  z-index:100;
  flex-wrap:wrap;
}
#topbar h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;letter-spacing:3px;color:var(--accent2);
  margin-right:8px;
}
.btn{
  display:flex;align-items:center;gap:5px;
  padding:7px 14px;border-radius:6px;border:none;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;transition:all 0.15s;white-space:nowrap;
  letter-spacing:0.3px;
}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-ghost.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-danger{background:var(--red);color:#fff;}
.btn-danger:hover{opacity:0.85;}
.btn-green{background:var(--green);color:#0f0f13;}
.btn-green:hover{opacity:0.85;}
.sep{width:1px;height:24px;background:var(--border);flex-shrink:0;}
#topbar .spacer{flex:1;}

/* ─── MAIN LAYOUT ─── */
#main{display:flex;flex:1;overflow:hidden;}

/* ─── CANVAS ─── */
#canvas-wrap{
  flex:1;overflow:auto;position:relative;
  background:var(--bg);
  background-image:radial-gradient(circle, var(--border) 1px, transparent 1px);
  background-size:24px 24px;
}
#canvas{position:relative;min-width:100%;min-height:100%;}
#lines{position:absolute;top:0;left:0;pointer-events:none;z-index:0;}

/* ─── NODES ─── */
.node{
  position:absolute;
  display:flex;align-items:center;justify-content:center;
  text-align:center;
  font-family:'Bebas Neue',sans-serif;
  letter-spacing:1.2px;line-height:1.2;
  border-radius:8px;
  cursor:pointer;user-select:none;
  z-index:1;
  transition:opacity 0.2s,box-shadow 0.15s,transform 0.1s;
  padding:4px 6px;word-break:break-word;
  border:2px solid transparent;
}
.node:hover{transform:translateY(-1px);box-shadow:0 4px 16px var(--shadow);}
.node.selected{border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(79,124,255,0.3)!important;}
.node.dimmed{opacity:0.2;pointer-events:none;}
.node.hidden{opacity:0;pointer-events:none;}

/* Level colors */
.nl0{background:#111;color:#fff;font-size:14px;}
.nl1{background:#fff;border-color:#ddd!important;color:#333;font-size:10px;}
.nl2{background:#1a5fff;color:#fff;font-size:10px;}
.nl3{background:#4a8fff;color:#fff;font-size:9px;}
.nl4{background:#7ab0ff;color:#0a1a40;font-size:9px;}
.nl5{background:#b0d0ff;color:#0a1a40;font-size:8px;}
.nl-form{background:#4f7cff;color:#fff;font-size:11px;box-shadow:0 3px 12px rgba(79,124,255,0.4);}

/* ─── SIDE PANEL ─── */
#panel{
  width:280px;flex-shrink:0;
  background:var(--surface);
  border-left:1px solid var(--border);
  overflow-y:auto;
  transition:transform 0.25s;
  display:flex;flex-direction:column;
}
#panel.hidden-panel{transform:translateX(100%);width:0;border:none;}
#panel-header{
  padding:14px 16px 10px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
#panel-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--accent2);}
#panel-body{padding:16px;flex:1;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;padding:8px 10px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:13px;
  outline:none;transition:border-color 0.15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field textarea{resize:vertical;min-height:60px;}
.field select option{background:var(--surface2);}
.panel-actions{display:flex;gap:8px;flex-direction:column;}
.panel-actions .btn{width:100%;justify-content:center;}

/* ─── OVERVIEW OVERLAY ─── */
#ov-wrap{
  display:none;position:fixed;inset:0;z-index:200;
  background:var(--bg);overflow:auto;
}
#ov-wrap.show{display:block;}
#ov-canvas{position:relative;}
#ov-lines{position:absolute;top:0;left:0;pointer-events:none;}
#ov-topbar{
  position:fixed;top:0;left:0;right:0;z-index:201;
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  background:rgba(15,15,19,0.95);border-bottom:1px solid var(--border);
  backdrop-filter:blur(8px);
}
.ov-node{
  position:absolute;display:flex;align-items:center;justify-content:center;
  text-align:center;font-family:'Bebas Neue',sans-serif;
  letter-spacing:1px;line-height:1.2;border-radius:6px;
  padding:3px 4px;word-break:break-word;
}

/* ─── MODAL ─── */
#modal-overlay{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,0.6);align-items:center;justify-content:center;
}
#modal-overlay.show{display:flex;}
#modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:24px;width:90%;max-width:400px;
  box-shadow:0 8px 32px var(--shadow);
}
#modal h2{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--accent2);margin-bottom:16px;}
#modal .field{margin-bottom:12px;}
#modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}

/* ─── TOAST ─── */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:10px 18px;font-size:13px;
  transition:transform 0.3s;z-index:999;pointer-events:none;
}
#toast.show{transform:translateX(-50%) translateY(0);}

/* ─── CONTEXT MENU ─── */
#ctx{
  display:none;position:fixed;z-index:500;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:4px;min-width:160px;
  box-shadow:0 4px 16px var(--shadow);
}
#ctx.show{display:block;}
.ctx-item{
  padding:8px 12px;border-radius:5px;cursor:pointer;font-size:13px;
  display:flex;align-items:center;gap:8px;
}
.ctx-item:hover{background:var(--surface);}
.ctx-item.danger{color:var(--red);}

/* ─── MOBILE ─── */
@media(max-width:640px){
  #panel{position:fixed;right:0;top:0;bottom:0;z-index:150;transform:translateX(100%);}
  #panel.open{transform:translateX(0);}
  #topbar h1{font-size:14px;}
}

/* ─── PRINT ─── */
@media print{
  #topbar,#panel,#ov-topbar,#toast,#ctx,#modal-overlay{display:none!important;}
  #ov-wrap{position:static!important;overflow:visible!important;}
  body{overflow:visible!important;height:auto!important;}
  @page{size:A3 landscape;margin:8mm;}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <h1>ORG EDITOR</h1>
  <div class="sep"></div>
  <button class="btn btn-primary" onclick="openAddModal()">+ Añadir Nodo</button>
  <button class="btn btn-ghost" id="btnUndo" onclick="undo()">↩ Deshacer</button>
  <div class="sep"></div>
  <button class="btn btn-ghost" id="btnOv" onclick="toggleOverview()">⊞ Overview</button>
  <button class="btn btn-ghost" onclick="printOv()">🖨 Imprimir</button>
  <div class="spacer"></div>
  <button class="btn btn-ghost" id="btnPanel" onclick="togglePanel()">⚙ Panel</button>
</div>

<!-- MAIN -->
<div id="main">
  <div id="canvas-wrap" onclick="handleCanvasClick(event)" oncontextmenu="handleCtxMenu(event)">
    <div id="canvas">
      <svg id="lines"></svg>
    </div>
  </div>
  <div id="panel">
    <div id="panel-header">
      <span id="panel-title">NODO</span>
      <button class="btn btn-ghost" style="padding:4px 8px;font-size:11px;" onclick="deselectAll()">✕</button>
    </div>
    <div id="panel-body">
      <div id="panel-empty" style="color:var(--text2);font-size:13px;padding-top:8px;">
        Selecciona un nodo para editarlo.
      </div>
      <div id="panel-form" style="display:none;">
        <div class="field">
          <label>Nombre</label>
          <input id="pf-name" type="text" oninput="liveRename()">
        </div>
        <div class="field">
          <label>Padre</label>
          <select id="pf-parent"></select>
        </div>
        <div class="field">
          <label>Notas</label>
          <textarea id="pf-notes" rows="3"></textarea>
        </div>
        <div class="panel-actions">
          <button class="btn btn-primary" onclick="applyEdit()">✓ Guardar</button>
          <button class="btn btn-danger" onclick="deleteSelected()">✕ Eliminar nodo</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- OVERVIEW -->
<div id="ov-wrap">
  <div id="ov-topbar">
    <span style="font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;color:var(--accent2);">VISTA GLOBAL</span>
    <button class="btn btn-ghost" onclick="toggleOverview()">✕ Cerrar</button>
    <button class="btn btn-ghost" onclick="printOv()">🖨 Imprimir</button>
  </div>
  <div id="ov-canvas">
    <svg id="ov-lines"></svg>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <h2 id="modal-title">AÑADIR NODO</h2>
    <div class="field">
      <label>Nombre del nodo</label>
      <input id="m-name" type="text" placeholder="Nombre..." onkeydown="if(event.key==='Enter')confirmModal()">
    </div>
    <div class="field">
      <label>Padre</label>
      <select id="m-parent"></select>
    </div>
    <div id="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmModal()">Guardar</button>
    </div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div id="ctx">
  <div class="ctx-item" onclick="ctxEdit()">✏️ Editar</div>
  <div class="ctx-item" onclick="ctxAdd()">＋ Añadir hijo</div>
  <div class="ctx-item danger" onclick="ctxDelete()">🗑 Eliminar</div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
let treeData = {
  id:'dir', name:'DIRECCIÓN', notes:'', children:[
    {id:'cap',  name:'CAPTACIÓN',    notes:'', children:[]},
    {id:'pre',  name:'PREP. FÍSICA', notes:'', children:[]},
    {id:'form', name:'FORMACIÓN',    notes:'', children:[
      {id:'gd', name:'GESTIÓN DEPORTIVA', notes:'', children:[
        {id:'coord', name:'COORD.', notes:'', children:[
          {id:'equi', name:'EQUIPOS', notes:'', children:[
            {id:'cts2', name:'CTs', notes:'', children:[]}
          ]},
          {id:'prom', name:'PROMOCIONES', notes:'', children:[]},
          {id:'edp',  name:'EDP', notes:'', children:[
            {id:'cts3', name:'STAFF EDP', notes:'', children:[]}
          ]},
        ]},
        {id:'rto', name:'RTO.', notes:'', children:[
          {id:'r1', name:'UR', notes:'', children:[
            {id:'cts4', name:'CTs', notes:'', children:[]}
          ]},
          {id:'r2', name:'DATOS Y ANÁLISIS', notes:'', children:[
            {id:'cts5', name:'ANALISTAS', notes:'', children:[]}
          ]},
        ]},
      ]},
      {id:'go', name:'GESTIÓN OPERATIVA', notes:'', children:[
        {id:'go1', name:'COORDINACIÓN INTERNA', notes:'', children:[
          {id:'go1a', name:'ADMON',    notes:'', children:[]},
          {id:'go1b', name:'CAPTACIÓN',notes:'', children:[]},
          {id:'go1c', name:'PROCESOS', notes:'', children:[]},
          {id:'go1d', name:'METODOL.', notes:'', children:[]},
        ]},
        {id:'go2', name:'SOPORTE INTERNO', notes:'', children:[
          {id:'go2a', name:'SOPORTE STAFF',   notes:'', children:[]},
          {id:'go2b', name:'PLATAFORMAS',     notes:'', children:[]},
          {id:'go2c', name:'FORMACIÓN INTERNA',notes:'', children:[]},
        ]},
        {id:'go3', name:'INNOVACIÓN Y DESARROLLO', notes:'', children:[
          {id:'go3a', name:'RM NEXT',          notes:'', children:[]},
          {id:'go3b', name:'BENCHMARKING',     notes:'', children:[]},
          {id:'go3c', name:'NUEVAS HERRAMIENTAS',notes:'', children:[]},
        ]},
        {id:'go4', name:'INFRAESTR. Y RECURSOS', notes:'', children:[
          {id:'go4a', name:'CAMPOS',    notes:'', children:[]},
          {id:'go4b', name:'EDIFICIOS', notes:'', children:[]},
          {id:'go4c', name:'MATERIALES',notes:'', children:[]},
        ]},
        {id:'go5', name:'RELACIONES', notes:'', children:[
          {id:'go5a', name:'FUNDACIÓN',    notes:'', children:[]},
          {id:'go5b', name:'UNIVERSIDAD',  notes:'', children:[]},
          {id:'go5c', name:'OTRAS INSTITUCIONES', notes:'', children:[]},
        ]},
      ]},
    ]},
    {id:'met', name:'METODOL.',  notes:'', children:[]},
    {id:'adm', name:'ADMÓN.',    notes:'', children:[]},
  ]
};

// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const NW = 80, NH = 44, GX = 14, GY = 52, MARGIN = 48;
const LEVEL_COLORS = ['#111','#ffffff','#1a5fff','#4a8fff','#7ab0ff','#b0d0ff'];
const LEVEL_TC     = ['#fff', '#222',   '#fff',   '#fff',   '#0a1a40','#0a1a40'];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let selected = null;
let ctxTarget = null;
let history = [];
let modalMode = 'add'; // 'add' | 'edit'
let modalParentId = null;
let panelOpen = window.innerWidth > 640;

const canvas = document.getElementById('canvas');
const svg    = document.getElementById('lines');

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function uid(){ return 'n'+ Date.now().toString(36) + Math.random().toString(36).slice(2,5); }

function cloneTree(t){ return JSON.parse(JSON.stringify(t)); }

function findNode(id, node=treeData){
  if(node.id===id) return node;
  for(const ch of node.children){ const r=findNode(id,ch); if(r) return r; }
  return null;
}
function findParent(id, node=treeData, par=null){
  if(node.id===id) return par;
  for(const ch of node.children){ const r=findParent(id,ch,node); if(r!==undefined) return r; }
  return undefined;
}
function getLevel(id, node=treeData, lvl=0){
  if(node.id===id) return lvl;
  for(const ch of node.children){ const r=getLevel(id,ch,lvl+1); if(r!==-1) return r; }
  return -1;
}
function allNodes(node=treeData, arr=[]){ arr.push(node); for(const ch of node.children) allNodes(ch,arr); return arr; }

function saveHistory(){ history.push(cloneTree(treeData)); if(history.length>50) history.shift(); }

function toast(msg,dur=2000){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

function resetFixed(node=treeData){ delete node._fixed; for(const ch of node.children) resetFixed(ch); }

function undo(){
  if(!history.length){ toast('Nada que deshacer'); return; }
  treeData=history.pop();
  selected=null;
  resetExpand();
  resetFixed();
  fullRender();
  updatePanel();
  toast('Deshecho ↩');
}

// ═══════════════════════════════════════════
// EXPAND STATE — which nodes are open
// ═══════════════════════════════════════════
let expandState = {}; // id -> boolean

function isVisible(node, parentId=null){
  if(!parentId) return true; // root always visible
  return !!expandState[parentId];
}

function toggleExpand(id){
  const node = findNode(id);
  if(!node || !node.children.length) return false;
  const par = findParent(id);
  // Accordion: close siblings
  if(par){
    for(const sib of par.children){
      if(sib.id !== id && expandState[sib.id]){
        expandState[sib.id] = false;
        collapseDeep(sib);
      }
    }
  }
  expandState[id] = !expandState[id];
  if(!expandState[id]) collapseDeep(node);
  return true;
}

function collapseDeep(node){
  expandState[node.id] = false;
  for(const ch of node.children) collapseDeep(ch);
}

function resetExpand(){
  expandState = {};
}

// ═══════════════════════════════════════════
// LAYOUT — only visible nodes
// ═══════════════════════════════════════════
function visSubtreeW(node){
  if(!expandState[node.id] || !node.children.length) return NW + GX;
  return Math.max(NW + GX, node.children.reduce((s,c)=>s+visSubtreeW(c),0));
}

function layoutVisible(node, left, y){
  const sw = visSubtreeW(node);
  const cx = left + sw/2;
  node._x = cx - NW/2;
  node._y = y;
  if(!expandState[node.id] || !node.children.length) return;
  let cur = left;
  for(const ch of node.children){
    layoutVisible(ch, cur, y + NH + GY);
    cur += visSubtreeW(ch);
  }
}

// For overview (full tree)
function subtreeW(node){
  if(!node.children.length) return NW + GX;
  return Math.max(NW + GX, node.children.reduce((s,c)=>s+subtreeW(c),0));
}

function layoutNode(node, left, y){
  const sw = subtreeW(node);
  const cx = left + sw/2;
  node._x = cx - NW/2;
  node._y = y;
  if(!node.children.length) return;
  let cur = left;
  for(const ch of node.children){
    layoutNode(ch, cur, y + NH + GY);
    cur += subtreeW(ch);
  }
}

function calcLayout(){
  const screenW = document.getElementById('canvas-wrap').clientWidth || window.innerWidth;

  // Level 0: root centered
  const rootSW = visSubtreeW(treeData);
  const startX = Math.max(MARGIN, (screenW - rootSW)/2);

  // Only layout if not already positioned (fixed positions)
  if(!treeData._fixed){
    layoutVisible(treeData, startX, MARGIN);
    // Fix root and level-1 positions permanently
    treeData._fixed = true;
    for(const ch of treeData.children) ch._fixed = true;
  } else {
    // Re-layout only expanded branches, keeping fixed nodes in place
    layoutFromFixed(treeData);
  }

  let maxX=0, maxY=0;
  function measureVisible(node){
    if(node._x !== undefined){ maxX=Math.max(maxX,node._x+NW); maxY=Math.max(maxY,node._y+NH); }
    if(expandState[node.id]) for(const ch of node.children) measureVisible(ch);
  }
  measureVisible(treeData);
  const cW = Math.max(maxX + MARGIN, screenW);
  const cH = maxY + MARGIN + 60;
  canvas.style.width  = cW + 'px';
  canvas.style.height = cH + 'px';
  svg.setAttribute('width',  cW);
  svg.setAttribute('height', cH);
}

function layoutFromFixed(node){
  // node is already positioned; if open, position its children centered under it
  if(!expandState[node.id] || !node.children.length) return;
  const parentCX = node._x + NW/2;
  const childY   = node._y + NH + GY;
  const n = node.children.length;
  const totalW = n * NW + (n-1) * GX;
  let curX = parentCX - totalW/2;
  for(const ch of node.children){
    ch._x = curX;
    ch._y = childY;
    curX += NW + GX;
    layoutFromFixed(ch);
  }
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function fullRender(){
  calcLayout();
  renderNodes();
  renderLines();
  populateSelects();
}

function renderNodes(){
  canvas.querySelectorAll('.node').forEach(e=>e.remove());
  function drawNode(node, lvl, parentVisible){
    const visible = parentVisible;
    const el = document.createElement('div');
    const bg = LEVEL_COLORS[Math.min(lvl, LEVEL_COLORS.length-1)];
    const tc = LEVEL_TC[Math.min(lvl, LEVEL_TC.length-1)];
    el.className = 'node nl' + Math.min(lvl, LEVEL_COLORS.length-1);
    if(node.id==='form') el.className = 'node nl-form';
    if(!visible) el.classList.add('hidden');
    el.id = 'nd_'+node.id;
    el.style.left = (node._x||0)+'px';
    el.style.top  = (node._y||0)+'px';
    el.style.width = NW+'px';
    el.style.minHeight = NH+'px';
    el.style.background = bg;
    el.style.color = tc;
    el.style.fontSize = lvl===0?'13px':lvl<=2?'10px':lvl<=3?'9px':'8px';
    el.innerHTML = node.name.replace(/\n/g,'<br>');
    if(node.children.length){
      const arrow = document.createElement('span');
      arrow.style.cssText='position:absolute;bottom:3px;right:5px;font-size:8px;opacity:0.6;transition:transform 0.2s;';
      arrow.textContent='▾';
      if(expandState[node.id]) arrow.style.transform='rotate(180deg)';
      el.style.position='absolute';
      el.appendChild(arrow);
    }
    if(node.id===selected) el.classList.add('selected');
    el.addEventListener('click', e=>{
      e.stopPropagation();
      const expanded = toggleExpand(node.id);
      if(!expanded) selectNode(node.id);
      else { selectNode(node.id); }
      fullRender();
    });
    el.addEventListener('dblclick', e=>{ e.stopPropagation(); openEditModal(node.id); });
    el.addEventListener('contextmenu', e=>{ e.preventDefault(); e.stopPropagation(); showCtx(e, node.id); });
    canvas.appendChild(el);
    for(const ch of node.children) drawNode(ch, lvl+1, visible && !!expandState[node.id]);
  }
  drawNode(treeData, 0, true);
}

function renderLines(){
  svg.innerHTML='';
  const LC='rgba(79,124,255,0.75)';
  function drawLines(node, visible){
    if(!visible) return;
    if(!expandState[node.id] || !node.children.length) return;
    const px=node._x+NW/2, py=node._y+NH;
    const midY=py+GY*0.4;
    _line(px,py,px,midY,LC);
    const vis=node.children;
    if(vis.length>1){
      _line(vis[0]._x+NW/2,midY,vis[vis.length-1]._x+NW/2,midY,LC);
    }
    for(const ch of vis){
      _line(ch._x+NW/2,midY,ch._x+NW/2,ch._y,LC);
      drawLines(ch, true);
    }
  }
  drawLines(treeData, true);
}

function _line(x1,y1,x2,y2,color,parent=svg){
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',x1);l.setAttribute('y1',y1);
  l.setAttribute('x2',x2);l.setAttribute('y2',y2);
  l.setAttribute('stroke',color);l.setAttribute('stroke-width','1.5');
  l.setAttribute('stroke-linecap','round');
  parent.appendChild(l); return l;
}

// ═══════════════════════════════════════════
// SELECT
// ═══════════════════════════════════════════
function selectNode(id){
  selected = selected===id ? null : id;
  canvas.querySelectorAll('.node').forEach(el=>{
    el.classList.toggle('selected', el.id==='nd_'+selected);
  });
  updatePanel();
  hideCtx();
  if(selected && window.innerWidth<=640){
    document.getElementById('panel').classList.add('open');
  }
}

function deselectAll(){
  selected=null;
  canvas.querySelectorAll('.node').forEach(el=>el.classList.remove('selected'));
  updatePanel();
  document.getElementById('panel').classList.remove('open');
}

function handleCanvasClick(e){
  if(e.target===canvas || e.target.id==='lines') deselectAll();
  hideCtx();
}

// ═══════════════════════════════════════════
// PANEL
// ═══════════════════════════════════════════
function togglePanel(){
  const p=document.getElementById('panel');
  panelOpen=!panelOpen;
  p.classList.toggle('hidden-panel',!panelOpen);
  document.getElementById('btnPanel').classList.toggle('active',panelOpen);
}

function updatePanel(){
  const empty=document.getElementById('panel-empty');
  const form=document.getElementById('panel-form');
  const title=document.getElementById('panel-title');
  if(!selected){ empty.style.display='block'; form.style.display='none'; title.textContent='NODO'; return; }
  const node=findNode(selected);
  if(!node){ empty.style.display='block'; form.style.display='none'; return; }
  empty.style.display='none'; form.style.display='block';
  title.textContent=node.name.slice(0,18).toUpperCase();
  document.getElementById('pf-name').value=node.name;
  document.getElementById('pf-notes').value=node.notes||'';
  populatePfParent(selected);
}

function populatePfParent(excludeId){
  const sel=document.getElementById('pf-parent');
  sel.innerHTML='';
  allNodes().forEach(n=>{
    if(n.id===excludeId) return;
    const o=document.createElement('option');
    o.value=n.id; o.textContent=n.name;
    sel.appendChild(o);
  });
  const par=findParent(excludeId);
  if(par) sel.value=par.id;
}

function liveRename(){
  if(!selected) return;
  const node=findNode(selected);
  if(!node) return;
  node.name=document.getElementById('pf-name').value;
  const el=document.getElementById('nd_'+selected);
  if(el) el.innerHTML=node.name.replace(/\n/g,'<br>');
}

function applyEdit(){
  if(!selected) return;
  saveHistory();
  const node=findNode(selected);
  if(!node) return;
  node.name=document.getElementById('pf-name').value||node.name;
  node.notes=document.getElementById('pf-notes').value;
  const newParentId=document.getElementById('pf-parent').value;
  const oldParent=findParent(selected);
  if(oldParent && newParentId && newParentId!==oldParent.id){
    // move node
    const idx=oldParent.children.findIndex(c=>c.id===selected);
    oldParent.children.splice(idx,1);
    const newPar=findNode(newParentId);
    if(newPar) newPar.children.push(node);
  }
  fullRender();
  toast('Guardado ✓');
}

// ═══════════════════════════════════════════
// ADD NODE
// ═══════════════════════════════════════════
function openAddModal(preParent=null){
  modalMode='add';
  modalParentId=preParent;
  document.getElementById('modal-title').textContent='AÑADIR NODO';
  document.getElementById('m-name').value='';
  populateMParent(null, preParent);
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('m-name').focus(),100);
}

function openEditModal(id){
  modalMode='edit';
  selected=id;
  const node=findNode(id);
  document.getElementById('modal-title').textContent='EDITAR NODO';
  document.getElementById('m-name').value=node.name;
  populateMParent(id);
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('m-name').focus(),100);
}

function populateMParent(excludeId=null, preSelect=null){
  const sel=document.getElementById('m-parent');
  sel.innerHTML='';
  allNodes().forEach(n=>{
    if(n.id===excludeId) return;
    const o=document.createElement('option');
    o.value=n.id; o.textContent=n.name;
    sel.appendChild(o);
  });
  if(preSelect) sel.value=preSelect;
  else if(selected && modalMode==='edit'){
    const par=findParent(selected);
    if(par) sel.value=par.id;
  } else if(selected) sel.value=selected;
}

function populateSelects(){
  populatePfParent(selected);
  populateMParent(selected);
}

function confirmModal(){
  const name=document.getElementById('m-name').value.trim();
  if(!name){ toast('Escribe un nombre'); return; }
  saveHistory();
  if(modalMode==='add'){
    const parentId=document.getElementById('m-parent').value;
    const par=findNode(parentId)||treeData;
    par.children.push({id:uid(), name:name.toUpperCase(), notes:'', children:[]});
    toast('Nodo añadido ✓');
  } else {
    const node=findNode(selected);
    if(!node){ closeModal(); return; }
    node.name=name.toUpperCase();
    const newParentId=document.getElementById('m-parent').value;
    const oldParent=findParent(selected);
    if(oldParent && newParentId!==oldParent.id){
      const idx=oldParent.children.findIndex(c=>c.id===selected);
      oldParent.children.splice(idx,1);
      const newPar=findNode(newParentId);
      if(newPar) newPar.children.push(node);
    }
    toast('Editado ✓');
  }
  closeModal();
  fullRender();
  updatePanel();
}

function closeModal(e){
  if(e && e.target!==document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('show');
}

// ═══════════════════════════════════════════
// DELETE
// ═══════════════════════════════════════════
function deleteSelected(){
  if(!selected) return;
  if(selected===treeData.id){ toast('No puedes eliminar el nodo raíz'); return; }
  if(!confirm('¿Eliminar este nodo y toda su rama?')) return;
  saveHistory();
  const par=findParent(selected);
  if(par){
    par.children=par.children.filter(c=>c.id!==selected);
  }
  selected=null;
  fullRender();
  updatePanel();
  toast('Eliminado 🗑');
}

// ═══════════════════════════════════════════
// CONTEXT MENU
// ═══════════════════════════════════════════
function showCtx(e, id){
  ctxTarget=id;
  selectNode(id);
  const ctx=document.getElementById('ctx');
  ctx.style.top=e.clientY+'px';
  ctx.style.left=e.clientX+'px';
  ctx.classList.add('show');
}
function hideCtx(){ document.getElementById('ctx').classList.remove('show'); }
function ctxEdit(){ hideCtx(); if(ctxTarget) openEditModal(ctxTarget); }
function ctxAdd(){ hideCtx(); openAddModal(ctxTarget); }
function ctxDelete(){ hideCtx(); if(ctxTarget){ selected=ctxTarget; deleteSelected(); } }
function handleCtxMenu(e){ e.preventDefault(); hideCtx(); }
document.addEventListener('click', hideCtx);

// ═══════════════════════════════════════════
// OVERVIEW
// ═══════════════════════════════════════════
let ovOpen=false;
const OV_SCALE=0.65, OV_NW=Math.round(NW*OV_SCALE), OV_NH=Math.round(NH*OV_SCALE);
const OV_GX=10, OV_GY=44, OV_MARGIN=60;

function ovSubtreeW(node){
  if(!node.children.length) return OV_NW+OV_GX;
  return Math.max(OV_NW+OV_GX, node.children.reduce((s,c)=>s+ovSubtreeW(c),0));
}
function ovLayout(node, left, y){
  const sw=ovSubtreeW(node);
  node._ox=left+sw/2-OV_NW/2;
  node._oy=y;
  if(!node.children.length) return;
  let cur=left;
  for(const ch of node.children){ ovLayout(ch,cur,y+OV_NH+OV_GY); cur+=ovSubtreeW(ch); }
}

function toggleOverview(){
  ovOpen=!ovOpen;
  document.getElementById('ov-wrap').classList.toggle('show',ovOpen);
  document.getElementById('btnOv').classList.toggle('active',ovOpen);
  if(ovOpen) renderOverview();
}

function renderOverview(){
  const wrap=document.getElementById('ov-canvas');
  const oSvg=document.getElementById('ov-lines');
  wrap.querySelectorAll('.ov-node').forEach(e=>e.remove());
  oSvg.innerHTML='';

  ovLayout(treeData, OV_MARGIN, OV_MARGIN+48);
  let maxX=0,maxY=0;
  allNodes().forEach(n=>{ maxX=Math.max(maxX,n._ox+OV_NW); maxY=Math.max(maxY,n._oy+OV_NH); });
  const cW=maxX+OV_MARGIN, cH=maxY+OV_MARGIN;
  wrap.style.width=cW+'px'; wrap.style.height=cH+'px';
  oSvg.setAttribute('width',cW); oSvg.setAttribute('height',cH);

  const LC='rgba(79,124,255,0.75)';
  function drawOvLines(node){
    if(!node.children.length) return;
    const px=node._ox+OV_NW/2, py=node._oy+OV_NH;
    const midY=py+OV_GY*0.38;
    _line(px,py,px,midY,LC,oSvg);
    if(node.children.length>1){
      const x1=node.children[0]._ox+OV_NW/2;
      const x2=node.children[node.children.length-1]._ox+OV_NW/2;
      _line(x1,midY,x2,midY,LC,oSvg);
    }
    for(const ch of node.children){
      _line(ch._ox+OV_NW/2,midY,ch._ox+OV_NW/2,ch._oy,LC,oSvg);
      drawOvLines(ch);
    }
  }
  drawOvLines(treeData);

  function drawOvNode(node,lvl){
    const el=document.createElement('div');
    el.className='ov-node';
    el.style.left=node._ox+'px'; el.style.top=node._oy+'px';
    el.style.width=OV_NW+'px'; el.style.minHeight=OV_NH+'px';
    const bg=LEVEL_COLORS[Math.min(lvl,LEVEL_COLORS.length-1)];
    const tc=LEVEL_TC[Math.min(lvl,LEVEL_TC.length-1)];
    el.style.background=bg; el.style.color=tc;
    el.style.fontSize=Math.max(6,11-lvl*1.2)+'px';
    el.style.letterSpacing='0.8px';
    el.textContent=node.name;
    wrap.appendChild(el);
    for(const ch of node.children) drawOvNode(ch,lvl+1);
  }
  drawOvNode(treeData,0);

  setTimeout(()=>{
    const scrollLeft=Math.max(0,(cW-window.innerWidth)/2);
    document.getElementById('ov-wrap').scrollLeft=scrollLeft;
    document.getElementById('ov-wrap').scrollTop=0;
  },50);
}

function printOv(){
  if(!ovOpen) toggleOverview();
  setTimeout(()=>window.print(),400);
}

// ═══════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ deselectAll(); hideCtx(); document.getElementById('modal-overlay').classList.remove('show'); }
  if(e.key==='Delete' && selected && document.activeElement.tagName!=='INPUT') deleteSelected();
  if((e.metaKey||e.ctrlKey) && e.key==='z'){ e.preventDefault(); undo(); }
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
if(window.innerWidth<=640) document.getElementById('panel').classList.add('hidden-panel');
resetExpand();
fullRender();
</script>
